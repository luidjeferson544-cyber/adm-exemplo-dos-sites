<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo • Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-zinc-950 text-gray-200">

    <header class="bg-zinc-900 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-gradient-to-br from-violet-500 to-fuchsia-600 rounded-2xl flex items-center justify-center text-white text-3xl">🌿</div>
                <div>
                    <h1 class="logo-font text-4xl font-bold tracking-tight text-white">exemplo</h1>
                    <p class="text-xs text-violet-400 -mt-1">Painel Administrativo</p>
                </div>
            </div>
        </div>
    </header>

    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-6xl p-8 shadow-2xl">
            <h2 class="text-4xl font-bold text-center mb-8 text-white">📋 Gerenciar Pedidos</h2>
            
            <input type="password" id="admin-pass" placeholder="Digite a senha do administrador" value="admin123"
                   class="w-full px-6 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl focus:border-violet-500 outline-none text-white mb-6">

            <button onclick="verPedidos()" 
                    class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white py-5 rounded-2xl text-xl font-semibold mb-8 hover:brightness-110">
                🔄 Carregar Todos os Pedidos
            </button>

            <div id="admin-pedidos-list" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // ==================== NOVA CONFIGURAÇÃO FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCy1vh73wVCVG94jHDNMkYQYyiXXfHzHo0",
            authDomain: "data-base-dos-sites.firebaseapp.com",
            projectId: "data-base-dos-sites",
            storageBucket: "data-base-dos-sites.firebasestorage.app",
            messagingSenderId: "328520422607",
            appId: "1:328520422607:web:e5d88712edafe5a71dd3ba",
            measurementId: "G-XCZK3CK3MW"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function verPedidos() {
            const senha = document.getElementById('admin-pass').value;
            if (senha !== "admin123") {   // ← Mude a senha aqui
                alert("❌ Senha incorreta!");
                return;
            }

            const container = document.getElementById('admin-pedidos-list');
            container.innerHTML = `<p class="text-center py-12 text-violet-400 text-xl">Carregando pedidos...</p>`;

            try {
                const snapshot = await db.collection("pedidos")
                    .orderBy("timestamp", "desc")
                    .get();

                container.innerHTML = '';

                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-center text-gray-400 py-20 text-xl">Nenhum pedido recebido ainda.</p>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const p = doc.data();
                    const id = doc.id;

                    let itensHtml = p.itens.map(item => 
                        `<div class="text-sm py-1">• ${item.name} - R$ ${item.price.toFixed(2)}</div>`
                    ).join('');

                    const div = document.createElement('div');
                    div.className = "bg-zinc-800 border border-zinc-700 rounded-3xl p-7";
                    div.innerHTML = `
                        <div class="flex flex-col md:flex-row justify-between gap-6">
                            <div class="flex-1">
                                <p class="font-bold text-2xl text-white">${p.nome}</p>
                                <p class="text-violet-400">${p.whatsapp}</p>
                                <p class="text-sm text-gray-500">${p.data}</p>
                                <p class="mt-4"><strong>Endereço:</strong> ${p.endereco}</p>
                                ${p.personalizacao ? `<p class="mt-2"><strong>Obs:</strong> ${p.personalizacao}</p>` : ''}
                            </div>
                            <div class="text-right">
                                <p class="text-3xl font-bold text-violet-400">R$ ${p.total.toFixed(2)}</p>
                                <span class="inline-block mt-3 px-6 py-2 rounded-2xl ${p.status === 'Entregue' ? 'bg-green-500' : 'bg-yellow-500'} text-white font-medium">
                                    ${p.status || 'Pendente'}
                                </span>
                            </div>
                        </div>

                        <div class="mt-6 border-t border-zinc-700 pt-5">
                            ${itensHtml}
                        </div>

                        <div class="flex gap-4 mt-8">
                            <button onclick="atualizarStatus('${id}')" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl">
                                ✅ Marcar como Entregue
                            </button>
                            <button onclick="deletarPedido('${id}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl">
                                🗑️ Excluir
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                container.innerHTML = `<p class="text-red-500 text-center py-12">Erro ao carregar: ${error.message}</p>`;
            }
        }

        async function atualizarStatus(id) {
            if (confirm("Marcar como ENTREGUE?")) {
                await db.collection("pedidos").doc(id).update({ status: "Entregue" });
                verPedidos();
            }
        }

        async function deletarPedido(id) {
            if (confirm("Excluir este pedido permanentemente?")) {
                await db.collection("pedidos").doc(id).delete();
                verPedidos();
            }
        }
    </script>
</body>
</html>
